<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advaith Prabhu — Portfolio OS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=VT323&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:'Work Sans',sans-serif;user-select:none;cursor:default;}
.material-symbols-outlined{
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
  font-feature-settings:'liga';
  -webkit-font-feature-settings:'liga';
  text-rendering:optimizeLegibility;
  font-family:'Material Symbols Outlined';
  display:inline-block;
}

/* ── BOOT ── */
.boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .7s ease;}
.boot.fade{opacity:0;pointer-events:none;}
.win-flag{display:grid;grid-template-columns:1fr 1fr;gap:3px;width:56px;height:56px;}
.win-flag div{border-radius:2px;}
.boot-bar-wrap{width:300px;height:22px;background:#0a0a1a;border:1px solid #222;border-radius:11px;overflow:hidden;margin:28px 0 10px;}
.boot-bar{height:100%;border-radius:11px;background:linear-gradient(90deg,#1e5fd4,#3a8eed,#7ec8ff);transition:width .4s ease-out;box-shadow:0 0 16px rgba(100,181,246,.7);}

/* ── DESKTOP & WALLPAPER ── */
.desktop{position:fixed;inset:0;overflow:hidden;}
.wallpaper{position:absolute;inset:0;overflow:hidden;}
.sky{position:absolute;inset:0;background:linear-gradient(180deg,#0d4f8c 0%,#1a6db8 15%,#2e8fd6 30%,#5aadea 45%,#8fccf0 58%,#c5e8f8 67%,#d8f0c8 68%,#90d060 76%,#5ab835 85%,#3a9020 93%,#2a7018 100%);animation:skyPulse 12s ease-in-out infinite alternate;}
@keyframes skyPulse{0%{filter:brightness(1) saturate(1);}100%{filter:brightness(1.06) saturate(1.08);}}
.sun{position:absolute;top:8%;right:18%;width:220px;height:220px;background:radial-gradient(circle,rgba(255,255,200,.65) 0%,rgba(255,220,80,.25) 35%,transparent 70%);border-radius:50%;animation:sunPulse 6s ease-in-out infinite alternate;}
@keyframes sunPulse{0%{transform:scale(1);opacity:.8;}100%{transform:scale(1.08);opacity:1;}}
.cloud{position:absolute;border-radius:50px;background:rgba(255,255,255,.92);}
.cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,.92);border-radius:50%;}
.cloud1{top:12%;width:180px;height:55px;animation:float1 50s linear -5s infinite;}
.cloud1::before{width:80px;height:70px;top:-30px;left:30px;}
.cloud1::after{width:70px;height:60px;top:-20px;left:90px;}
.cloud2{top:20%;width:120px;height:38px;animation:float2 70s linear -25s infinite;}
.cloud2::before{width:55px;height:50px;top:-22px;left:18px;}
.cloud2::after{width:50px;height:42px;top:-14px;left:60px;}
.cloud3{top:6%;width:240px;height:70px;animation:float3 90s linear -40s infinite;}
.cloud3::before{width:110px;height:90px;top:-40px;left:40px;}
.cloud3::after{width:90px;height:76px;top:-28px;left:120px;}
@keyframes float1{from{transform:translateX(-250px);}to{transform:translateX(110vw);}}
@keyframes float2{from{transform:translateX(-180px);}to{transform:translateX(110vw);}}
@keyframes float3{from{transform:translateX(-300px);}to{transform:translateX(110vw);}}

/* ── DESKTOP ICONS ── */
.desk-icon{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px;width:76px;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1),filter .15s;border:1px solid transparent;}
.desk-icon:hover{transform:perspective(450px) rotateY(10deg) rotateX(-6deg) translateY(-5px) scale(1.1);filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));}
.desk-icon.sel{background:rgba(0,0,128,.25);border:1px dotted rgba(255,255,255,.6);}
.desk-icon.sel .icon-lbl{background:#000080;color:#fff;}
.icon-lbl{font-family:'Work Sans',sans-serif;font-size:11px;color:#fff;text-align:center;padding:1px 4px;max-width:74px;line-height:1.3;word-break:break-word;text-shadow:1px 1px 3px rgba(0,0,0,.9),0 0 6px rgba(0,0,0,.6);}

/* ── WINDOW FRAME ── */
.win-frame{position:fixed;display:flex;flex-direction:column;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #666;border-right:2px solid #666;background:#c0c0c0;box-shadow:6px 6px 0 rgba(0,0,0,.35),12px 12px 0 rgba(0,0,0,.12);}
.win-open{animation:winOpen .45s cubic-bezier(.34,1.56,.64,1) both;}
.win-close{animation:winClose .32s cubic-bezier(.25,.46,.45,.94) both;}
@keyframes winOpen{from{opacity:0;transform:perspective(1100px) rotateX(14deg) scale(.82) translateY(28px);filter:blur(3px);}to{opacity:1;transform:perspective(1100px) rotateX(0deg) scale(1) translateY(0);filter:blur(0);}}
@keyframes winClose{from{opacity:1;transform:perspective(1100px) scale(1);}to{opacity:0;transform:perspective(1100px) rotateX(-12deg) scale(.7) translateY(36px);filter:blur(4px);}}

.win-tbar{height:30px;flex-shrink:0;background:var(--tbar-bg,linear-gradient(90deg,#004040 0%,#006565 50%,#008888 100%));display:flex;align-items:center;padding:0 4px;position:relative;overflow:hidden;}
.win-tbar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 100%);pointer-events:none;}
.wctrl{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;color:#fff;font-family:'Work Sans',sans-serif;border:1px solid rgba(0,0,0,.4);transition:filter .1s,transform .1s;position:relative;z-index:1;}
.wctrl:hover{filter:brightness(1.4);transform:scale(1.08);}
.wctrl:active{filter:brightness(.9);transform:scale(.94);}
.wctrl.cl{background:linear-gradient(135deg,#e84848,#b81820);}
.wctrl.mn{background:linear-gradient(135deg,#4070d8,#2848b0);}
.wctrl.mx{background:linear-gradient(135deg,#4070d8,#2848b0);}

.addr{background:#c0c0c0;padding:3px 5px;display:flex;align-items:center;gap:5px;border-bottom:1px solid #999;flex-shrink:0;}
.addr-btn{background:#c0c0c0;border:2px solid;border-color:#fff #666 #666 #fff;padding:2px 4px;cursor:pointer;display:flex;align-items:center;}
.addr-btn:active{border-color:#666 #fff #fff #666;transform:translate(1px,1px);}
.addr-path{flex:1;background:#fff;border:2px solid;border-color:#666 #fff #fff #666;padding:1px 7px;height:22px;display:flex;align-items:center;font-family:'Work Sans',sans-serif;font-size:11px;color:#555;overflow:hidden;}
.win-status{height:22px;background:#c0c0c0;border-top:1px solid #999;display:flex;align-items:center;padding:0 8px;flex-shrink:0;font-family:'Work Sans',sans-serif;font-size:11px;color:#444;gap:12px;}
.status-panel{border:1px solid;border-color:#666 #fff #fff #666;padding:1px 8px;font-size:10px;}

/* ── TASKBAR ── */
.taskbar{position:fixed;bottom:0;left:0;right:0;height:40px;z-index:5000;background:linear-gradient(180deg,#e4e4e4 0%,#ccc 30%,#b8b8b8 100%);border-top:2px solid #fff;display:flex;align-items:center;padding:0 4px;gap:3px;box-shadow:0 -2px 10px rgba(0,0,0,.25);}
.start-btn{display:flex;align-items:center;gap:6px;height:33px;padding:0 14px;background:linear-gradient(180deg,#58b030 0%,#3c9010 50%,#2a6c08 100%);border-top:2px solid #a8e068;border-left:2px solid #a8e068;border-bottom:2px solid #184008;border-right:2px solid #184008;border-radius:0 15px 15px 0;color:#fff;font-weight:700;font-family:'Space Grotesk',sans-serif;font-size:14px;cursor:pointer;letter-spacing:.3px;box-shadow:2px 2px 4px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.2);margin-left:-4px;transition:filter .1s,transform .1s;}
.start-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.start-btn:active{transform:translateY(1px);filter:brightness(.92);}
.start-btn.active{border-top:2px solid #184008;border-left:2px solid #184008;border-bottom:2px solid #a8e068;border-right:2px solid #a8e068;transform:translateY(1px);}
.task-btn{display:flex;align-items:center;gap:6px;height:28px;padding:0 9px;min-width:130px;max-width:170px;font-family:'Work Sans',sans-serif;font-size:11px;cursor:pointer;border:2px solid;border-color:#fff #666 #666 #fff;background:linear-gradient(180deg,#ddd 0%,#c8c8c8 100%);overflow:hidden;transition:filter .1s;}
.task-btn.on{border-color:#666 #fff #fff #666;background:linear-gradient(180deg,#aaa 0%,#bbb 100%);transform:translateY(1px);}
.task-btn:hover:not(.on){filter:brightness(1.05);}
.sys-tray{margin-left:auto;height:100%;display:flex;align-items:center;gap:8px;padding:0 10px;background:linear-gradient(180deg,#c4c4c4,#b0b0b0);border:2px solid;border-color:#666 #fff #fff #666;}

/* ── START MENU ── */
.start-menu{position:fixed;bottom:40px;left:0;width:330px;background:#fff;border:2px solid #666;border-bottom:none;box-shadow:4px 0 16px rgba(0,0,0,.35);z-index:8000;animation:menuUp .22s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes menuUp{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.menu-hdr{background:linear-gradient(90deg,#0a2070,#1a60d0 60%,#3890f0 100%);padding:12px 16px;display:flex;align-items:center;gap:14px;}
.menu-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-family:'Work Sans',sans-serif;font-size:13px;border-left:3px solid transparent;transition:background .1s,border-color .1s;}
.menu-item:hover{background:#0a2070;color:#fff;border-left-color:#90c8ff;}
.menu-item:hover span.material-symbols-outlined{color:#fff!important;}
.menu-divider{height:1px;background:#ddd;margin:4px 0;}

/* ── DIALOG ── */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9500;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.dialog{background:#c0c0c0;width:320px;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #666;border-right:2px solid #666;box-shadow:6px 6px 0 rgba(0,0,0,.4);animation:winOpen .3s cubic-bezier(.34,1.56,.64,1) both;}
.dialog-tbar{background:linear-gradient(90deg,#082080,#2878e8);height:26px;display:flex;align-items:center;padding:0 8px;gap:8px;}

/* ── CRT OVERLAY ── */
.crt{position:fixed;inset:0;pointer-events:none;z-index:9000;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px),repeating-linear-gradient(90deg,rgba(255,0,0,.015),rgba(0,255,0,.01),rgba(0,0,255,.015));background-size:100% 3px,3px 100%;}

/* ── TWEAKS PANEL ── */
.tweaks-panel{position:fixed;bottom:50px;right:16px;width:220px;background:#c0c0c0;z-index:8500;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #666;border-right:2px solid #666;box-shadow:4px 4px 0 rgba(0,0,0,.3);animation:winOpen .3s cubic-bezier(.34,1.56,.64,1) both;}
.tweaks-panel .win-tbar{height:26px;}

/* ── KEYFRAMES ── */
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes statusPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:.7;}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

const tag = (bg, color) => ({

const sectionTitle = {
  fontFamily: "'Space Grotesk', sans-serif", fontSize: 11, fontWeight: 700,
  textTransform: 'uppercase', letterSpacing: 2, color: '#474eb7',

const insetField = {
  width: '100%', padding: '6px 8px', fontSize: 12,
  fontFamily: "'Work Sans', sans-serif",
  border: '2px solid', borderColor: '#5d5e5f #ddd #ddd #5d5e5f',

/* ══════════════════════
   DESKTOP ICON
══════════════════════ */
function DesktopIcon({ icon, label, selected, onSelect, onOpen, color='white' }) {
  const timer = useRef(null);
  const clicks = useRef(0);
  const handleClick = (e) => {
    onSelect(e);
    clicks.current++;
    if (clicks.current === 1) {
      timer.current = setTimeout(() => { clicks.current = 0; }, 400);
    } else {
      clearTimeout(timer.current);
      clicks.current = 0;
      onOpen();
    }
  };
  return (
    <div className={`desk-icon${selected?' sel':''}`} onClick={handleClick}>
      <span className="material-symbols-outlined" style={{fontSize:40,color,filter:'drop-shadow(1px 2px 4px rgba(0,0,0,.7))'}}>{icon}</span>
      <span className="icon-lbl">{label}</span>
    </div>
  );
}

/* ══════════════════════
   WINDOW
══════════════════════ */
function Window({ id, title, icon, path, children, state, onClose, onMinimize, onMaximize, onFocus, defW=680, defH=500 }) {
  const [pos, setPos] = useState(state.pos || {x:100,y:60});
  const [dragging, setDragging] = useState(false);
  const [dragOff, setDragOff] = useState({x:0,y:0});
  const [closing, setClosing] = useState(false);
  const [animKey, setAnimKey] = useState(0);

  useEffect(() => { setAnimKey(k => k+1); }, []);

  const doClose = () => {
    setClosing(true);
    setTimeout(() => { setClosing(false); onClose(); }, 320);
  };

  const onTitleDown = (e) => {
    if (e.target.closest('.wctrl') || state.maximized) return;
    onFocus();
    setDragging(true);
    setDragOff({x: e.clientX - pos.x, y: e.clientY - pos.y});
    e.preventDefault();
  };

  useEffect(() => {
    if (!dragging) return;
    const mv = e => setPos({
      x: Math.max(0, Math.min(window.innerWidth - defW, e.clientX - dragOff.x)),
      y: Math.max(32, Math.min(window.innerHeight - 100, e.clientY - dragOff.y)),
    });
    const up = () => setDragging(false);
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
    return () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
  }, [dragging, dragOff, defW]);

  if (!state.open) return null;

  const maxStyle = state.maximized
    ? {left:0,top:32,width:'100vw',height:'calc(100vh - 72px)'}
    : {left:pos.x,top:pos.y,width:defW,height:defH};

  return (
    <div key={animKey} className={`win-frame ${closing?'win-close':'win-open'}`}
      style={{...maxStyle,zIndex:state.z,display:state.minimized?'none':'flex'}}
      onMouseDown={onFocus}>
      <div className="win-tbar" onMouseDown={onTitleDown} style={{cursor:state.maximized?'default':'move'}}>
        <span className="material-symbols-outlined" style={{color:'#fff',fontSize:15,marginRight:5,flexShrink:0}}>{icon}</span>
        <span style={{color:'#fff',fontFamily:"'Space Grotesk'",fontWeight:600,fontSize:13,flex:1,pointerEvents:'none',textShadow:'1px 1px 2px rgba(0,0,0,.5)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {title}
        </span>
        <div style={{display:'flex',gap:3,position:'relative',zIndex:1}}>
          <div className="wctrl mn" onClick={onMinimize} title="Minimize"><span style={{fontSize:14,lineHeight:1}}>─</span></div>
          <div className="wctrl mx" onClick={onMaximize} title={state.maximized?'Restore':'Maximize'}><span style={{fontSize:11}}>{state.maximized?'❐':'□'}</span></div>
          <div className="wctrl cl" onClick={doClose} title="Close"><span style={{fontSize:13}}>✕</span></div>
        </div>
      </div>
      <div className="addr">
        <button className="addr-btn"><span className="material-symbols-outlined" style={{fontSize:14}}>arrow_back</span></button>
        <button className="addr-btn"><span className="material-symbols-outlined" style={{fontSize:14}}>arrow_forward</span></button>
        <button className="addr-btn"><span className="material-symbols-outlined" style={{fontSize:14}}>home</span></button>
        <div className="addr-path">C:\Desktop\Portfolio\{path}</div>
        <button className="addr-btn"><span className="material-symbols-outlined" style={{fontSize:14}}>search</span></button>
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',background:'#fff'}}>
        {children}
      </div>
      <div className="win-status">
        <div className="status-panel">Ready</div>
        <div className="status-panel">{title}</div>
        <div style={{marginLeft:'auto',fontSize:10,color:'#666'}}>advaith@portfolio</div>
      </div>
    </div>
  );
}

function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => {
    const i = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(i);
  }, []);
  const fmt = t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const date = t.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return (
    <div title={date} style={{textAlign:'center',cursor:'default'}}>
      <div style={{fontFamily:"'Work Sans'",fontSize:12,fontWeight:700,color:'#111',lineHeight:1.2}}>{fmt}</div>
      <div style={{fontFamily:"'Work Sans'",fontSize:9,color:'#444'}}>{date}</div>
    </div>
  );
}

          />
        ))}
      </div>

      {/* Windows */}
      {Object.entries(WIN_CFG).map(([id,cfg])=>(
        <Window key={id} id={id} title={cfg.title} icon={cfg.icon} path={cfg.path}
          state={wins[id]} onClose={()=>closeWin(id)} onMinimize={()=>minWin(id)}
          onMaximize={()=>maxWin(id)} onFocus={()=>focusWin(id)}
          defW={cfg.defW} defH={cfg.defH}>
          {id==='portfolio'&&<PortfolioContent/>}
          {id==='about'    &&<AboutContent/>}
          {id==='contact'  &&<ContactContent/>}
        </Window>
      ))}

      {/* Alert dialog */}
      {dialog&&(
        <div className="dialog-overlay" onClick={()=>setDialog(null)}>
          <div className="dialog" onClick={e=>e.stopPropagation()}>
            <div className="dialog-tbar">
              <span className="material-symbols-outlined" style={{color:'#fff',fontSize:14}}>info</span>
              <span style={{color:'#fff',fontFamily:"'Space Grotesk'",fontWeight:600,fontSize:12}}>System Message</span>
            </div>
            <div style={{padding:20,display:'flex',gap:14,alignItems:'center'}}>
              <span className="material-symbols-outlined" style={{fontSize:40,color:'#474eb7',flexShrink:0}}>info</span>
              <p style={{fontFamily:"'Work Sans'",fontSize:13,lineHeight:1.5}}>{dialog}</p>
            </div>
            <div style={{padding:'8px 14px',borderTop:'1px solid #aaa',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={()=>setDialog(null)} style={{padding:'4px 22px',background:'#c0c0c0',cursor:'pointer',fontFamily:"'Space Grotesk'",fontWeight:700,fontSize:12,border:'2px solid',borderColor:'#fff #666 #666 #fff'}}>OK</button>
            </div>
          </div>
        </div>
      )}

      {/* Start menu */}
      {startOpen&&(
        <div className="start-menu">
          <div className="menu-hdr">
            <div style={{width:44,height:44,background:'rgba(255,255,255,.15)',border:'2px solid rgba(255,255,255,.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span className="material-symbols-outlined" style={{fontSize:28,color:'#fff'}}>person</span>
            </div>
            <div>
              <div style={{color:'#fff',fontFamily:"'Space Grotesk'",fontWeight:700,fontSize:15}}>Advaith Prabhu</div>
              <div style={{color:'rgba(255,255,255,.65)',fontFamily:"'VT323'",fontSize:14,letterSpacing:1.5}}>ASPIRING QUANT</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr'}}>
            <div style={{borderRight:'1px solid #e0e0e0',padding:'6px 0'}}>
              <div style={{padding:'4px 14px 2px',fontSize:10,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:1}}>Applications</div>
              {[
                {icon:'folder_open',label:'Portfolio',action:()=>openWin('portfolio')},
                {icon:'person',     label:'About Me', action:()=>openWin('about')},
                {icon:'mail',       label:'Contact',  action:()=>openWin('contact')},
              ].map(it=>(
                <div key={it.label} className="menu-item" onClick={it.action}>
                  <span className="material-symbols-outlined" style={{fontSize:18,color:'#474eb7'}}>{it.icon}</span>
                  <span style={{fontWeight:600}}>{it.label}</span>
                </div>
              ))}
            </div>
            <div style={{background:'#f4f4f4',padding:'6px 0'}}>
              <div style={{padding:'4px 14px 2px',fontSize:10,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:1}}>Links</div>
              {[
                {icon:'code',    label:'GitHub',  action:()=>window.open('https://github.com/advaithprabhudev','_blank')},
                {icon:'business',label:'LinkedIn',action:()=>window.open('https://linkedin.com/in/advaith-prabhu','_blank')},
              ].map(it=>(
                <div key={it.label} className="menu-item" onClick={it.action}>
                  <span className="material-symbols-outlined" style={{fontSize:18,color:'#474eb7'}}>{it.icon}</span>
                  <span>{it.label}</span>
                </div>
              ))}
              <div className="menu-divider"/>
              <div className="menu-item" onClick={()=>{setTweakOpen(t=>!t);setStartOpen(false);}}>
                <span className="material-symbols-outlined" style={{fontSize:18,color:'#474eb7'}}>settings</span>
                <span>Tweaks</span>
              </div>
            </div>
          </div>
          <div style={{borderTop:'1px solid #ccc',background:'#e4e4e4',padding:'5px 10px',display:'flex',justifyContent:'flex-end',gap:8}}>
            <div className="menu-item" style={{padding:'3px 12px',border:'1px solid #aaa',background:'#c0c0c0',fontSize:12}}
              onClick={()=>setDialog('Shut down is disabled in Portfolio OS.\n\nPlease enjoy the experience!')}>
              <span className="material-symbols-outlined" style={{fontSize:14,color:'#444'}}>power_settings_new</span>
              <span>Shut Down</span>
            </div>
          </div>
        </div>
      )}

      {/* Tweaks panel */}
      {tweakOpen&&(
        <div className="tweaks-panel">
          <div className="win-tbar" style={{cursor:'default'}}>
            <span className="material-symbols-outlined" style={{color:'#fff',fontSize:13,marginRight:4}}>settings</span>
            <span style={{color:'#fff',fontFamily:"'Space Grotesk'",fontWeight:600,fontSize:12,flex:1}}>Tweaks</span>
            <div className="wctrl cl" style={{width:18,height:18}} onClick={()=>setTweakOpen(false)}>✕</div>
          </div>
          <div style={{padding:12,display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontFamily:"'Work Sans'",fontSize:12,fontWeight:600}}>CRT Scanlines</span>
              <button onClick={()=>setTweak('crtEffect',!tweaks.crtEffect)} style={{width:40,height:20,background:tweaks.crtEffect?'#474eb7':'#ccc',border:'2px solid',borderColor:tweaks.crtEffect?'#2a2e8a #6068d2 #6068d2 #2a2e8a':'#666 #fff #fff #666',cursor:'pointer',display:'flex',alignItems:'center',padding:'0 2px',transition:'background .2s'}}>
                <div style={{width:14,height:14,background:'#fff',transform:`translateX(${tweaks.crtEffect?18:0}px)`,transition:'transform .2s'}}/>
              </button>
            </div>
            <div>
              <div style={{fontFamily:"'Work Sans'",fontSize:12,fontWeight:600,marginBottom:6}}>Title Bar Theme</div>
              <div style={{display:'flex',gap:6}}>
                {[
                  {k:'xp-blue',bg:'linear-gradient(90deg,#082080,#2878e8,#78b8f4)'},
                  {k:'dark',   bg:'linear-gradient(90deg,#111,#333,#666)'},
                  {k:'teal',   bg:'linear-gradient(90deg,#004040,#006565,#008888)'},
                ].map(opt=>(
                  <div key={opt.k} onClick={()=>setTweak('titleTheme',opt.k)}
                    style={{width:60,height:22,background:opt.bg,cursor:'pointer',border:`2px solid ${tweaks.titleTheme===opt.k?'#fff':'#666'}`,outline:tweaks.titleTheme===opt.k?'2px solid #474eb7':'none'}}/>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Taskbar */}
      <div className="taskbar">
        <button className={`start-btn${startOpen?' active':''}`} onClick={()=>setStartOpen(s=>!s)}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:1.5,width:18,height:18}}>
            <div style={{background:'#f8d840',borderRadius:'1px 0 0 0'}}/>
            <div style={{background:'#f8d840',borderRadius:'0 1px 0 0'}}/>
            <div style={{background:'#f8d840',borderRadius:'0 0 0 1px'}}/>
            <div style={{background:'#f8d840',borderRadius:'0 0 1px 0'}}/>
          </div>
          <span style={{fontStyle:'italic'}}>Start</span>
        </button>
        <div style={{width:2,height:28,background:'linear-gradient(180deg,#999,#fff,#999)',margin:'0 2px'}}/>
        {Object.entries(WIN_CFG).map(([id,cfg])=>
          wins[id].open&&(
            <button key={id} className={`task-btn${!wins[id].minimized?' on':''}`} onClick={()=>toggleTaskWin(id)}>
              <span className="material-symbols-outlined" style={{fontSize:13,flexShrink:0}}>{cfg.icon}</span>
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cfg.title}</span>
            </button>
          )
        )}
        <div className="sys-tray">
          <span className="material-symbols-outlined" style={{fontSize:15,color:'#333'}}>wifi</span>
          <span className="material-symbols-outlined" style={{fontSize:15,color:'#333'}}>volume_up</span>
          <Clock/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
